<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reviews — Employee Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f5f5f5; }
    .portal-header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .portal-header h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    .portal-header span {
      font-size: 13px;
      color: #aaa;
    }
    .portal-container {
      max-width: 800px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .review-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }
    .review-card:hover { border-color: #1a1a1a; }
    .review-card h3 {
      font-size: 15px;
      margin: 0 0 4px 0;
    }
    .review-card p {
      font-size: 13px;
      color: #888;
      margin: 0;
    }
    .review-text {
      margin-top: 16px;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }
    .logout-btn {
      background: none;
      border: 1px solid #444;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="portal-header">
  <h1>My Reviews</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="portal-username"></span>
    <button class="logout-btn" onclick="portalLogout()">
      Sign Out
    </button>
  </div>
</div>

<div class="portal-container">
  <div id="reviews-container">
    <div style="text-align:center;padding:60px 20px;">
      <p style="color:#666;margin-bottom:20px;">
        Click below to load your reviews
      </p>
      <button onclick="loadMyReviews()"
        style="background:#1a1a1a;color:#fff;border:none;
        padding:12px 28px;border-radius:8px;font-size:14px;
        cursor:pointer;">
        View My Reviews
      </button>
    </div>
  </div>
</div>

<script>
const empName = sessionStorage.getItem('empName');
const empReviewName = sessionStorage.getItem('empReviewName');

if (sessionStorage.getItem('auth') !== 'employee' || !empName) {
  window.location.href = '/';
}

document.getElementById('portal-username').textContent = empName;

function portalLogout() {
  sessionStorage.clear();
  window.location.href = '/';
}

function formatReviewText(text) {
  if (!text) return '';
  return text
    .replace(/^## (.+)$/gm,
      '<h3 style="margin:16px 0 8px;">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm,
      '<li style="margin:4px 0;">$1</li>')
    .replace(/(<li[^>]*>.*?<\/li>\n?)+/gs,
      '<ul style="margin:8px 0 8px 20px;">$&</ul>')
    .replace(/\n\n/g, '<br>');
}

async function loadMyReviews() {
  const container = document.getElementById('reviews-container');
  container.innerHTML =
    '<p style="text-align:center;color:#888;padding:40px;">Loading...</p>';
  try {
    const res = await fetch(
      `/api/reviews?name=${encodeURIComponent(empReviewName)}`
    );
    const reviews = await res.json();
    if (!Array.isArray(reviews) || reviews.length === 0) {
      container.innerHTML =
        '<div class="empty-state"><p>No reviews found yet.</p></div>';
      return;
    }
    container.innerHTML = reviews.map((r, i) => `
      <div class="review-card">
        <div style="display:flex;align-items:center;
          justify-content:space-between;">
          <div>
            <h3>${r.type || 'Review'}</h3>
            <p>${r.date || ''}</p>
          </div>
          ${r.docUrl ? `
            <a href="${r.docUrl}" target="_blank"
              style="background:#1a1a1a;color:#fff;
              text-decoration:none;padding:8px 16px;
              border-radius:8px;font-size:13px;
              white-space:nowrap;">
              View Review
            </a>` : ''}
        </div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML =
      '<div class="empty-state"><p>Failed to load reviews. Please try again.</p></div>';
    console.error(e);
  }
}


</script>
</body>
</html>
