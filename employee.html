<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reviews — Employee Portal</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f5f5f5; }
    .portal-header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .portal-header h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    .portal-header span {
      font-size: 13px;
      color: #aaa;
    }
    .portal-container {
      max-width: 800px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .review-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
    }
    .review-card:hover { border-color: #1a1a1a; }
    .review-card h3 {
      font-size: 15px;
      margin: 0 0 4px 0;
    }
    .review-card p {
      font-size: 13px;
      color: #888;
      margin: 0;
    }
    .review-text {
      margin-top: 16px;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }
    .logout-btn {
      background: none;
      border: 1px solid #444;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="portal-header">
  <h1>My Reviews</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="portal-username"></span>
    <button class="logout-btn" onclick="portalLogout()">
      Sign Out
    </button>
  </div>
</div>

<div class="portal-container">
  <div id="reviews-container">
    <p style="color:#888;text-align:center;padding:40px;">
      Loading your reviews...
    </p>
  </div>
</div>

<script>
const empName = sessionStorage.getItem('empName');
const empReviewName = sessionStorage.getItem('empReviewName');

if (sessionStorage.getItem('auth') !== 'employee' || !empName) {
  window.location.href = '/';
}

document.getElementById('portal-username').textContent = empName;

const CONFIG = {
  sheetId: '1M8LvVrgPCarObzGSWeicjpQSh43FvfSDm79wk1efOW4',
  reviewSheet: 'Reviews',
  googleClientId: '152603955396-3pau8atgci9o9icccmfbirblu0pcjesc.apps.googleusercontent.com'
};

let googleToken = null;

function portalLogout() {
  sessionStorage.clear();
  window.location.href = '/';
}

function formatReviewText(text) {
  if (!text) return '';
  return text
    .replace(/^## (.+)$/gm, '<h3 style="margin:16px 0 8px;">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '<li style="margin:4px 0;">$1</li>')
    .replace(/(<li[^>]*>.*<\/li>)/gs, '<ul style="margin:8px 0 8px 20px;">$1</ul>')
    .replace(/\n\n/g, '<br>');
}

async function getPortalToken() {
  return new Promise((resolve) => {
    if (googleToken) { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.googleClientId,
        scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
        callback: (response) => {
          googleToken = response.access_token;
          resolve();
        }
      });
      client.requestAccessToken({ prompt: '' });
    };
    document.head.appendChild(script);
  });
}

async function loadMyReviews() {
  const container = document.getElementById('reviews-container');
  try {
    await getPortalToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}/values/${CONFIG.reviewSheet}`;
    const res = await fetch(url, {
      headers: { Authorization: 'Bearer ' + googleToken }
    });
    const data = await res.json();
    const rows = data.values || [];
    if (rows.length < 2) {
      container.innerHTML = '<div class="empty-state"><p>No reviews found yet.</p></div>';
      return;
    }
    const headers = rows[0];
    const myReviews = rows.slice(1).filter(row => {
      const empCol = headers.indexOf('Employee');
      return empCol >= 0 &&
        row[empCol] &&
        row[empCol].toLowerCase() === empReviewName.toLowerCase();
    });
    if (myReviews.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>No reviews found for your account.</p></div>';
      return;
    }
    const empCol = headers.indexOf('Employee');
    const typeCol = headers.indexOf('Review Type');
    const dateCol = headers.indexOf('Review Date');
    const textCol = headers.indexOf('Review Text');
    container.innerHTML = myReviews.reverse().map((row, i) => `
      <div class="review-card" onclick="toggleReview(${i})">
        <h3>${row[typeCol] || 'Review'}</h3>
        <p>${row[dateCol] || ''}</p>
        <div class="review-text" id="review-${i}">
          ${formatReviewText(row[textCol] || 'No content available.')}
        </div>
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML =
      '<div class="empty-state"><p>Failed to load reviews. Please try again.</p></div>';
    console.error(e);
  }
}

function toggleReview(i) {
  const el = document.getElementById('review-' + i);
  el.style.display = el.style.display === 'none' ||
    !el.style.display ? 'block' : 'none';
}

loadMyReviews();
</script>
</body>
</html>
